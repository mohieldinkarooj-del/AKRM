# This is a basic workflow to help you get started with Actions

name: CI

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v4

      # Runs a single command using the runners shell
      - name: Run a one-line script
        run: echo Hello, world!

      # Runs a set of commands using the runners shell
      - name: Run a multi-line script
        run: |
          echo Add other actions to build,
          echo test, and deploy your project.
            - الاسم: إعداد Java JDK
  يستخدم: actions/setup-java@v5.2.0
  مع:
    # إصدار Java المراد إعداده. يتطلب إصدار Java كاملًا أو إصدارًا دلاليًا (semver). راجع أمثلة على الصيغة المدعومة في ملف README.
    إصدار جافا: # اختياري
    # مسار ملف `.java-version`. راجع أمثلة الصيغة المدعومة في ملف README.
    ملف إصدار جافا: # اختياري
    # توزيعة جافا. راجع قائمة التوزيعات المدعومة في ملف README
    توزيع:
    # نوع الحزمة (jdk، jre، jdk+fx، jre+fx)
    حزمة جافا: # اختياري، القيمة الافتراضية هي jdk
    # بنية الحزمة (يتم استخدام بنية مشغل الإجراءات افتراضيًا)
    الهندسة المعمارية: # اختياري
    # مسار موقع ملف JDK المضغوط
    ملف jdk: # اختياري
    # اضبط هذا الخيار إذا كنت تريد أن يتحقق الإجراء من أحدث إصدار متاح يفي بمواصفات الإصدار
    التحقق من آخر التحديثات: # اختياري
    # معرّف مستودع إدارة التوزيع في ملف pom.xml. القيمة الافتراضية هي `github`
    معرّف الخادم: # اختياري، القيمة الافتراضية هي github
    # اسم متغير البيئة لاسم المستخدم المستخدم للمصادقة على مستودع Apache Maven. القيمة الافتراضية هي $GITHUB_ACTOR
    اسم مستخدم الخادم: # اختياري، القيمة الافتراضية هي GITHUB_ACTOR
    # اسم متغير البيئة لكلمة المرور أو الرمز المميز للمصادقة على مستودع Apache Maven. القيمة الافتراضية هي $GITHUB_TOKEN
    كلمة مرور الخادم: # اختياري، القيمة الافتراضية هي GITHUB_TOKEN
    # مسار كتابة ملف settings.xml. المسار الافتراضي هو ~/.m2.
    مسار الإعدادات: # اختياري
    # استبدل ملف settings.xml إذا كان موجودًا. القيمة الافتراضية هي "صحيح".
    overwrite-settings: # اختياري، القيمة الافتراضية هي صحيح
    # مفتاح GPG الخاص المراد استيراده. القيمة الافتراضية هي سلسلة فارغة.
    gpg-private-key: # اختياري
    # اسم متغير البيئة لعبارة مرور المفتاح الخاص بـ GPG. القيمة الافتراضية هي $GPG_PASSPHRASE.
    gpg-passphrase: # اختياري
    # اسم منصة البناء لتخزين التبعيات مؤقتًا. يمكن أن تكون "maven" أو "gradle" أو "sbt".
    ذاكرة التخزين المؤقت: # اختياري
    # مسار ملف التبعية: pom.xml، build.gradle، build.sbt، إلخ. يمكن استخدام هذا الخيار مع خيار `cache`. في حال عدم تحديد هذا الخيار، يبحث الإجراء عن ملف التبعية في المستودع بأكمله. يدعم هذا الخيار الأحرف البديلة وقائمة بأسماء الملفات لتخزين تبعيات متعددة مؤقتًا.
    مسار تبعية التخزين المؤقت: # اختياري
    # حل بديل لتمرير حالة المهمة إلى خطوة ما بعد المهمة. هذا المتغير غير مخصص للضبط اليدوي.
    حالة الوظيفة: # اختياري، القيمة الافتراضية هي ${{ job.status }}
    # الرمز المميز المستخدم للمصادقة عند جلب بيانات الإصدار المستضافة على github.com، مثل إصدار Microsoft من OpenJDK. عند تنفيذ هذا الإجراء على github.com، تكون القيمة الافتراضية كافية. عند التشغيل على GHES، يمكنك تمرير رمز وصول شخصي لـ github.com إذا كنت تواجه قيودًا على معدل الاستخدام.
    الرمز المميز: # اختياري، القيمة الافتراضية هي ${{ github.server_url == 'https://github.com' && github.token || '' }}
    # اسم مُعرّف سلسلة أدوات Maven إذا لم يكن الاسم الافتراضي "${distribution}_${java-version}" مطلوبًا. راجع أمثلة على الصيغة المدعومة في ملف الاستخدام المتقدم.
    mvn-toolchain-id: # اختياري
    # اسم مُورّد مجموعة أدوات Maven إذا لم يكن الاسم الافتراضي "${distribution}" مطلوبًا. راجع أمثلة على الصيغة المدعومة في ملف الاستخدام المتقدم.
    mvn-toolchain-vendor: # اختياري
          cancel-timeout-minutes: concurrency:
                      - الاسم: تنزيل ملف بناء
  الاستخدامات: actions/download-artifact@v3.1.0
  مع:
    - اسم القطعة الأثرية
    الاسم: # اختياري
    # مسار الوجهة
    المسار: # اختياري
                        - الاسم: التفاعل الأول
  الاستخدامات: actions/first-interaction@v1.3.0
  مع:
    # رمز مميز للمستودع. يمكن تمريره باستخدام {{ secrets.GITHUB_TOKEN }}
    رمز الريبو:
    تعليق للنشر على أول مشكلة لشخص ما
    رسالة المشكلة: # اختياري
    تعليق للنشر على أول طلب سحب لشخص ما
    رسالة العميل: # اختياري

          
